ai_usage_summary: |
  Used Claude for code review, architecture discussion, and component design.
  No candidate data was fed to any LLM. All scoring logic is deterministic
  Python running locally with zero network calls.

methodology_summary: |
  Rule-based, multi-component ranker with five scoring dimensions:
  (1) Skill taxonomy match — 40% weight. Candidate skills are matched
      against a curated 50-entry taxonomy of AI/ML skills relevant to the
      Senior AI Engineer JD. Each match is weighted by taxonomy tier,
      proficiency level, endorsement count, usage duration, and Redrob
      platform assessment scores.
  (2) Career trajectory — 25% weight. Current/most-recent title is scored
      against a relevance map (ML Engineer → 1.0, Backend Engineer → 0.55,
      HR Manager → 0.08). Past roles contribute with decay.
  (3) Experience bell curve — 15% weight. Gaussian centred at 7 years
      (JD sweet spot 5–9 years) with σ=3.5.
  (4) Behavioral signals — 15% weight. Weighted composite of 7 Redrob
      signals: recruiter response rate, GitHub activity score, recency,
      interview completion rate, profile completeness, search visibility,
      notice period.
  (5) Education — 5% weight. Institution tier + field-of-study bonus.
  
  Post-scoring: availability multiplier (0.65–1.0) based on open-to-work
  flag + last-active recency; honeypot penalty (×0.20) applied after four
  independent heuristic checks. Runtime: ~30–60 seconds on a modern CPU.

declarations:
